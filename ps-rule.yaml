#
# PSRule configuration
#

# Please see the documentation for all configuration options:
# https://microsoft.github.io/PSRule/

requires:
  PSRule: "@pre >=2.9.0"

output:
  culture:
    - en-US

input:
  fileObjects: true
  pathIgnore:
    - "*.md"
    - "*.json"
    - ".vscode/"
    - "dotnet-install.sh"
